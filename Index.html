<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZypruYT</title>
    <style>
        /* Basic reset to remove default browser margins */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* A dark background to complement the bright blues and whites of the banner */
            background-color: #0a0e17; 
            font-family: sans-serif;
        }

        .header-banner {
            width: 100%;
            /* Adds a subtle shadow below the banner for depth */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            background-color: #000;
        }

        .header-banner img {
            width: 100%;
            max-width: 1920px; /* Prevents the image from stretching too far on ultra-wide screens */
            height: auto;
            display: block;
        }

        .content-area {
            padding: 40px 20px;
            color: #ffffff;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Banner Section -->
    <header class="header-banner">
        <img src="Final overlay.jpg" alt="ZypruYT Banner featuring anime eye and logo">
    </header>

    <!-- Main Content Placeholder -->
    <main class="content-area">
        <h1>Welcome to ZypruYT</h1>
        <p>This is a starting template for your website.</p>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZypruYT - Animated Banner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0e17; 
            font-family: sans-serif;
            overflow-x: hidden;
        }

        /* Container to hide any overflow from the scaling animation */
        .banner-container {
            width: 100%;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            background-color: #000;
            
            /* Pulsing glow animation on the container */
            animation: pulseGlow 4s infinite alternate ease-in-out;
        }

        .banner-container img {
            width: 100%;
            max-width: 1920px;
            height: auto;
            display: block;
            
            /* Smooth cinematic breathing effect on the image */
            animation: breathe 8s infinite alternate ease-in-out;
        }

        /* Keyframes for the image scaling (Breathing effect) */
        @keyframes breathe {
            0% {
                transform: scale(1);
                filter: brightness(1) contrast(1);
            }
            100% {
                transform: scale(1.05); /* Zooms in slightly */
                filter: brightness(1.1) contrast(1.05); /* Gets slightly brighter */
            }
        }

        /* Keyframes for the glowing shadow */
        @keyframes pulseGlow {
            0% {
                box-shadow: 0 5px 15px rgba(0, 136, 255, 0.2);
            }
            100% {
                box-shadow: 0 5px 35px rgba(0, 136, 255, 0.8);
            }
        }

        .content-area {
            padding: 60px 20px;
            color: #ffffff;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Animated Banner Section -->
    <header class="banner-container">
        <img src="Final overlay.jpg" alt="ZypruYT Banner featuring anime eye and logo">
    </header>

    <!-- Main Content Placeholder -->
    <main class="content-area">
        <h1>Welcome to ZypruYT</h1>
        <p>Your banner is now animated with CSS!</p>
    </main>

</body>
</html>
